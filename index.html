<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק למידת ערבית מדוברת</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            position: relative;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .btn-google {
            background-color: #4285F4;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn-google:hover {
            background-color: #357ae8;
        }
        .welcome-msg {
            font-size: 18px;
            color: #27ae60;
            font-weight: bold;
            margin-top: 20px;
            display: none;
        }
        /* סימון הגרסה בתחתית המסך */
        .version-tag {
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-size: 12px;
            color: #bdc3c7;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>יאללה, לדבר ערבית!</h1>
        <p>ברוכים הבאים למשחק למידת ערבית מדוברת מאפס. כדי לשמור את ההתקדמות שלך מכל מכשיר, אנא התחבר:</p>
        
        <button class="btn-google" id="loginBtn">התחברות באמצעות Google</button>
        <div class="welcome-msg" id="welcomeMsg"></div>
    </div>

    <div class="version-tag">v1.0</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQMRU4HWpFlHc-EJmurZDhdiZywZWdCz4",
            authDomain: "arabic-learning-game.firebaseapp.com",
            projectId: "arabic-learning-game",
            storageBucket: "arabic-learning-game.firebasestorage.app",
            messagingSenderId: "246704525050",
            appId: "1:246704525050:web:b6f6aee90c6ec93a5cc343",
            measurementId: "G-T79GZD76HD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('loginBtn');
        const welcomeMsg = document.getElementById('welcomeMsg');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginBtn.style.display = 'none';
                welcomeMsg.innerText = `אהלן ${user.displayName}, איזה כיף שבאת! מתחברים...`;
                welcomeMsg.style.display = 'block';
            }
        });

        loginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    console.log("מחובר בהצלחה:", result.user);
                })
                .catch((error) => {
                    console.error("שגיאה בהתחברות:", error);
                    alert("חלון ההתחברות נחסם על ידי הדפדפן או שיש להוסיף את הדומיין של גיטהב ל-Firebase Authorized Domains.");
                });
        });
    </script>
</body>
</html>
