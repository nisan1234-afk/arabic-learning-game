<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק למידת ערבית מדוברת - שלב 1</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            position: relative;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 25px;
        }
        .letters-container {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            gap: 15px;
        }
        .letter-card {
            background: #f8f9fa;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            width: 90px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            user-select: none;
        }
        .letter-card:hover {
            transform: translateY(-3px);
            border-color: #3498db;
            background: #ebf5fb;
        }
        .letter-card:active {
            transform: scale(0.95);
        }
        .arabic-char {
            font-size: 48px;
            font-weight: bold;
            color: #2c3e50;
            display: block;
            margin-bottom: 5px;
        }
        .letter-name {
            font-size: 14px;
            color: #7f8c8d;
            display: block;
        }
        .instruction {
            font-size: 18px;
            font-weight: 500;
            color: #34495e;
        }
        .version-tag {
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-size: 12px;
            color: #bdc3c7;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>שלב 1: אותיות וצלילים</h1>
        <p class="subtitle">כאן מתחילים ללמוד את יסודות השפה!</p>
        
        <p class="instruction">לחץ על האותיות כדי לשמוע איך הוגים אותן בערבית:</p>
        
        <div class="letters-container">
            <div class="letter-card" onclick="playMp3('https://upload.wikimedia.org/wikipedia/commons/3/30/Alif.ogg')">
                <span class="arabic-char">ا</span>
                <span class="letter-name">אליף (א)</span>
            </div>
            <div class="letter-card" onclick="playMp3('https://upload.wikimedia.org/wikipedia/commons/0/07/B%C4%81%27.ogg')">
                <span class="arabic-char">ب</span>
                <span class="letter-name">בא (ב)</span>
            </div>
            <div class="letter-card" onclick="playMp3('https://upload.wikimedia.org/wikipedia/commons/6/6f/T%C4%81%27.ogg')">
                <span class="arabic-char">ت</span>
                <span class="letter-name">תא (ת)</span>
            </div>
        </div>
    </div>

    <div class="version-tag">stage1-v1.2</div>

    <script>
        // פונקציה שמנגנת קובץ שמע אמיתי מהאינטרנט
        function playMp3(url) {
            const audio = new Audio(url);
            audio.play().catch(error => {
                console.error("שגיאה בניגון קובץ השמע:", error);
                alert("הדפדפן חסם את השמע. נסה ללחוץ שוב או לרענן.");
            });
        }
    </script>
</body>
</html>
