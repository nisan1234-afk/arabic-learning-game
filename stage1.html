<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק למידת ערבית מדוברת - שלב 1</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            position: relative;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        
        /* מסך פתיחה */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(240, 244, 248, 0.98);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .btn-start-game {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
            transition: transform 0.2s;
        }
        .btn-start-game:hover {
            transform: scale(1.05);
            background-color: #27ae60;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 25px;
        }
        .letters-container {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            gap: 15px;
        }
        .letter-card {
            background: #f8f9fa;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            width: 90px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            user-select: none;
        }
        .letter-card:hover {
            transform: translateY(-3px);
            border-color: #3498db;
            background: #ebf5fb;
        }
        .arabic-char {
            font-size: 48px;
            font-weight: bold;
            color: #2c3e50;
            display: block;
            margin-bottom: 5px;
        }
        .letter-name {
            font-size: 14px;
            color: #7f8c8d;
            display: block;
        }
        .instruction {
            font-size: 18px;
            font-weight: 500;
            color: #34495e;
        }
        .version-tag {
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-size: 12px;
            color: #bdc3c7;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <!-- מסך פתיחה שמפעיל את מנגנון האודיו -->
    <div class="overlay" id="startOverlay">
        <h1>מוכנים לשמוע ערבית?</h1>
        <p class="subtitle">לחץ על הכפתור כדי להפעיל את השמע במשחק</p>
        <button class="btn-start-game" onclick="initAudioEngine()">קדימה, להתחיל! 🔊</button>
    </div>

    <div class="container">
        <h1>שלב 1: אותיות וצלילים</h1>
        <p class="subtitle">כאן מתחילים ללמוד את יסודות השפה!</p>
        
        <p class="instruction">לחץ על האותיות כדי לשמוע איך הוגים אותן בערבית:</p>
        
        <div class="letters-container">
            <div class="letter-card" onclick="playLetterAudio('alifAudio')">
                <span class="arabic-char">ا</span>
                <span class="letter-name">אליף (א)</span>
            </div>
            <div class="letter-card" onclick="playLetterAudio('baaAudio')">
                <span class="arabic-char">ب</span>
                <span class="letter-name">בא (ב)</span>
            </div>
            <div class="letter-card" onclick="playLetterAudio('taaAudio')">
                <span class="arabic-char">ت</span>
                <span class="letter-name">תא (ת)</span>
            </div>
        </div>
    </div>

    <!-- נגני אודיו נסתרים מובנים בדף - החלפת שרת לקבצי MP3 פתוחים -->
    <audio id="alifAudio" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>
    <audio id="baaAudio" src="https://www.soundjay.com/buttons/sounds/button-17.mp3" preload="auto"></audio>
    <audio id="taaAudio" src="https://www.soundjay.com/buttons/sounds/button-18.mp3" preload="auto"></audio>

    <div class="version-tag">stage1-v1.6</div>

    <script>
        function initAudioEngine() {
            // טעינה והפעלה שקטה לעקיפת חסימות
            document.querySelectorAll('audio').forEach(audio => {
                audio.play().then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                }).catch(e => console.log("טעינה ראשונית"));
            });

            document.getElementById('startOverlay').style.display = 'none';
        }

        function playLetterAudio(audioId) {
            document.querySelectorAll('audio').forEach(audio => {
                audio.pause();
                audio.currentTime = 0;
            });

            const audioBtn = document.getElementById(audioId);
            if (audioBtn) {
                audioBtn.play().catch(error => {
                    console.error("שגיאה בניגון:", error);
                });
            }
        }
    </script>
</body>
</html>
