
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>בדיקת שמע</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      text-align: center;
      padding-top: 80px;
      direction: rtl;
    }

    .box {
      background: white;
      max-width: 420px;
      margin: auto;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    button {
      font-size: 24px;
      padding: 18px 32px;
      border: none;
      border-radius: 12px;
      background: #2ecc71;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #27ae60;
    }

    .version {
      margin-top: 25px;
      color: #999;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>בדיקת שמע</h1>
    <p>לחץ על הכפתור כדי לנגן את קובץ האליף:</p>

    <button onclick="playSound()">נגן אליף 🔊</button>

    <audio id="alifAudio" src="001-alif.mp3" preload="auto"></audio>

    <div class="version">audio-test-v1</div>
  </div>

  <script>
    function playSound() {
      const audio = document.getElementById("alifAudio");
      audio.currentTime = 0;
      audio.play().catch(function(error) {
        alert("השמע לא הופעל. בדוק שהקובץ נמצא באותו מקום כמו הדף.");
        console.error(error);
      });
    }
  </script>

</body>
</html>
